<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4UC3_CH4T // ENCRYPTED NODE</title>
    <style>
        :root {
            --bg-base: #020202;
            --bg-panel: #080808;
            --main-green: #00ff41;
            --dim-green: #008f11;
            --alert-red: #ff003c;
            --border-color: #003b00;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-mono);
            background: var(--bg-base);
            color: var(--main-green);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Glitch or glow effects */
        .glow-text {
            text-shadow: 0 0 5px var(--main-green), 0 0 10px var(--main-green);
        }

        /* ── Login Screen ── */
        #loginScreen {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 40px 36px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            position: relative;
            z-index: 10;
        }

        #loginScreen::before {
            content: "[ SECURE CONNECTION ESTABLISHED ]";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg-base);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--dim-green);
        }

        #loginScreen h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--main-green);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--main-green);
        }

        #loginScreen p {
            font-size: 0.85rem;
            color: var(--dim-green);
            margin-bottom: 28px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        #loginScreen label {
            display: block;
            font-size: 0.8rem;
            color: var(--dim-green);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #loginScreen input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--main-green);
            font-family: var(--font-mono);
            font-size: 1rem;
            margin-bottom: 18px;
            outline: none;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        #loginScreen input:focus {
            border-color: var(--main-green);
            box-shadow: inset 0 0 5px rgba(0, 255, 65, 0.3);
        }

        #loginScreen button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--main-green);
            background: transparent;
            color: var(--main-green);
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        #loginScreen button:hover { 
            background: var(--main-green);
            color: #000;
            box-shadow: 0 0 15px var(--main-green);
        }
        #loginScreen button:active { transform: translateY(2px); }

        .error-msg {
            color: var(--alert-red);
            font-size: 0.8rem;
            margin-top: -12px;
            margin-bottom: 14px;
            display: none;
            text-shadow: 0 0 5px var(--alert-red);
        }
        .error-msg::before { content: "ERR: "; }

        /* ── Chat Screen ── */
        #chatScreen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
            z-index: 10;
        }

        #sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #sidebar h2 {
            font-size: 0.9rem;
            color: var(--dim-green);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        #roomLabel {
            font-size: 0.9rem;
            color: var(--main-green);
            margin-bottom: 12px;
            font-weight: bold;
            word-break: break-all;
        }
        #roomLabel::before { content: "> TARGET_NODE: "; color: var(--dim-green); font-weight: normal; }

        #connectedUsers {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #connectedUsers .user-chip {
            font-size: 0.85rem;
            color: var(--main-green);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        #connectedUsers .user-chip::before {
            content: '[ON]';
            color: var(--dim-green);
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        #chatMain {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
        }

        #chatHeader {
            padding: 16px 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--main-green);
            letter-spacing: 1px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); border-left: 1px solid var(--border-color); }
        ::-webkit-scrollbar-thumb { background: var(--dim-green); }
        ::-webkit-scrollbar-thumb:hover { background: var(--main-green); }

        #messages .msg {
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            display: flex;
            flex-direction: column;
        }

        #messages .msg.mine {
            align-self: flex-end;
            text-align: right;
            border-right: 2px solid var(--main-green);
            padding-right: 12px;
        }

        #messages .msg.theirs {
            align-self: flex-start;
            border-left: 2px solid var(--dim-green);
            padding-left: 12px;
            color: #ccc;
        }

        #messages .msg .msg-sender {
            font-size: 0.75rem;
            color: var(--dim-green);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* ── AI Message Styles ── */
        #messages .msg.ai-msg {
            align-self: flex-start;
            border-left: 2px solid var(--alert-red);
            padding-left: 12px;
            color: #fff;
            background: rgba(255, 0, 60, 0.05); /* Slight red back */
            padding: 10px;
        }

        #messages .msg.ai-msg .msg-sender {
            color: var(--alert-red);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 5px rgba(255, 0, 60, 0.5);
        }
        
        .ai-hint {
            font-size: 0.75rem;
            color: var(--dim-green);
            margin-top: 6px;
            text-align: center;
            opacity: 0.7;
        }
        
        .ai-hint b {
            color: var(--main-green);
        }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: none;
            padding: 8px 12px;
            font-size: 0.85rem;
            color: var(--alert-red);
            align-self: flex-start;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            border-left: 2px solid var(--alert-red);
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #inputArea {
            padding: 16px 24px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #inputArea::before {
            content: "root@node:~#";
            color: var(--dim-green);
            font-size: 0.95rem;
        }

        #messageInput {
            flex: 1;
            padding: 8px;
            border: none;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            color: var(--main-green);
            font-family: var(--font-mono);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus { border-color: var(--main-green); }

        #sendBtn {
            padding: 8px 20px;
            border: 1px solid var(--dim-green);
            background: transparent;
            color: var(--main-green);
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        #sendBtn:hover { 
            background: var(--main-green); 
            color: #000;
        }
    </style>
</head>

<body>

    <!-- ── Login Screen ── -->
    <div id="loginScreen">
        <h1 class="glow-text">S4UC3_CH4T // TERMINAL</h1>
        <p>IDENTIFICATION REQUIRED TO ACCESS ENCRYPTED NETWORK</p>

        <label for="usernameInput">User Alias</label>
        <input id="usernameInput" type="text" placeholder="guest_acc" maxlength="24" autocomplete="off" spellcheck="false" />
        <div id="usernameError" class="error-msg">ACCESS DENIED: ALIAS REQUIRED</div>

        <label for="roomInput">Target Node Registry</label>
        <input id="roomInput" type="text" placeholder="0x0000" maxlength="32" autocomplete="off" spellcheck="false" />
        <div id="roomError" class="error-msg">ACCESS DENIED: NODE REGISTRY REQUIRED</div>

        <button id="joinBtn">Execute Connection</button>
    </div>

    <!-- ── Chat Screen ── -->
    <div id="chatScreen">
        <div id="sidebar">
            <div>
                <h2>Target Specs</h2>
                <div id="roomLabel"></div>
            </div>
            <div>
                <h2>Active Connections</h2>
                <div id="connectedUsers"></div>
            </div>
        </div>
        <div id="chatMain">
            <div id="chatHeader"></div>
            <div id="messages"></div>
            
            <div id="aiTypingIndicator" class="typing-indicator">
                System Overload // AI Processing...
            </div>

            <div>
                <div id="inputArea">
                    <input id="messageInput" placeholder="Enter command or message..." autocomplete="off" spellcheck="false" />
                    <button id="sendBtn">[ TX ]</button>
                </div>
                <div class="ai-hint">SYSTEM HINT: Use <b>@ai &lt;query&gt;</b> or <b>@ai summarize</b> to access mainframe intel.</div>
            </div>
        </div>
    </div>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();

        let username = "";
        let room = "";

        // ── Login logic ──
        document.getElementById("joinBtn").addEventListener("click", joinRoom);
        document.getElementById("usernameInput").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("roomInput").focus(); });
        document.getElementById("roomInput").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom(); });

        function joinRoom() {
            const uInput = document.getElementById("usernameInput").value.trim();
            const rInput = document.getElementById("roomInput").value.trim();

            let valid = true;
            document.getElementById("usernameError").style.display = uInput ? "none" : "block";
            document.getElementById("roomError").style.display = rInput ? "none" : "block";
            if (!uInput || !rInput) return;

            username = uInput;
            room = rInput;

            // Switch screens
            document.getElementById("loginScreen").style.display = "none";
            const chatScreen = document.getElementById("chatScreen");
            chatScreen.style.display = "flex";
            document.getElementById("roomLabel").textContent = room.toUpperCase();
            document.getElementById("chatHeader").textContent = "ESTABLISHED P2P CONNECTION WITH >> " + room.toUpperCase();

            socket.emit("join", { username, room });
            document.getElementById("messageInput").focus();
        }

        // ── Socket events ──
        socket.on("users", (userList) => {
            const container = document.getElementById("connectedUsers");
            container.innerHTML = "";
            userList.forEach((user) => {
                const chip = document.createElement("div");
                chip.className = "user-chip";
                chip.textContent = user.username.toUpperCase();
                container.appendChild(chip);
            });
        });

        socket.on("message", (data) => {
            const msgDiv = document.createElement("div");
            
            if (data.isAI) {
                msgDiv.className = "msg ai-msg";
            } else {
                msgDiv.className = "msg " + (data.sender === username ? "mine" : "theirs");
            }

            if (data.sender !== username || data.isAI) {
                const senderEl = document.createElement("div");
                senderEl.className = "msg-sender";
                // Add terminal user handle tag
                senderEl.innerHTML = data.isAI ? "SYSTEM [AUTONOMOUS AI]" : `USR_${data.sender.toUpperCase()}`;
                msgDiv.appendChild(senderEl);
            }

            const textEl = document.createElement("div");
            
            // Basic formatting for AI bullet points
            let formattedText = data.text;
            if (data.isAI) {
                formattedText = formattedText.replace(/\n•/g, '<br> > ').replace(/\n\*/g, '<br> > ').replace(/\n-/g, '<br> > ');
            }
            textEl.innerHTML = formattedText;
            
            msgDiv.appendChild(textEl);

            const messages = document.getElementById("messages");
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        });

        // Toggle typing indicator
        socket.on("aiTyping", (isTyping) => {
            const indicator = document.getElementById("aiTypingIndicator");
            indicator.style.display = isTyping ? "block" : "none";
            const messages = document.getElementById("messages");
            messages.scrollTop = messages.scrollHeight;
        });

        // ── Send message ──
        function sendMessage() {
            const input = document.getElementById("messageInput");
            if (!input.value.trim() || !room) return;

            socket.emit("message", {
                text: input.value.trim(),
                sender: username,
                room: room
            });

            input.value = "";
        }

        document.getElementById("sendBtn").addEventListener("click", sendMessage);
        document.getElementById("messageInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
